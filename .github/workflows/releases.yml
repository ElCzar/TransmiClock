name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on v1.0.0, v1.2.3, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore secrets.properties
        run: echo "${{ secrets.SECRET_PROPERTIES_BASE64 }}" | base64 --decode > secrets.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease
      
      - name: Sign APK
        run: |
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > keystore.jks
      
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
            --out app/build/outputs/apk/release/transmiclock-signed.apk \
            $UNSIGNED_APK
      
          rm keystore.jks
          echo "SIGNED_APK=app/build/outputs/apk/release/transmiclock-signed.apk" >> $GITHUB_ENV
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.SIGNED_APK }}
          generate_release_notes: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
